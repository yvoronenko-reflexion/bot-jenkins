# Copy to config.toml and fill in. Keep permissions tight: chmod 600 config.toml

[slack]
bot_token = "xoxb-REPLACE"
app_token = "xapp-REPLACE"
allowed_users = ["U0123456789"]   # Slack member IDs allowed to run commands

# How to handle command output that exceeds MAX_OUTPUT characters.
# "chunk"   — split into multiple chat messages (requires only chat:write)
# "snippet" — upload as a file/snippet (requires files:write scope)
long_output = "chunk"
